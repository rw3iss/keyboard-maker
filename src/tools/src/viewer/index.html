<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyboard Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    canvas { display: block; }

    /* ---------- Layer panel (top-right) ---------- */
    #layer-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      min-width: 170px;
    }

    #layer-panel h3 {
      margin-bottom: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    #layer-panel label {
      display: flex;
      align-items: center;
      margin: 6px 0;
      cursor: pointer;
      user-select: none;
    }

    #layer-panel input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #6699ff;
    }

    .layer-color {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 6px;
    }

    /* ---------- Info panel (top-left) ---------- */
    #info-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      z-index: 10;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 300px;
    }

    #info-panel h2 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #6699ff;
    }

    #info-panel .row {
      display: flex;
      justify-content: space-between;
      margin: 3px 0;
    }

    #info-panel .label { color: #888; }
    #info-panel .value { color: #ccc; }

    /* ---------- Bottom bar ---------- */
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: #666;
      font-family: monospace;
      font-size: 11px;
      padding: 6px 14px;
      z-index: 10;
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ---------- Loading overlay ---------- */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 100;
      font-family: monospace;
      font-size: 14px;
      color: #888;
      transition: opacity 0.4s;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="loading">Loading keyboard viewer...</div>

<div id="info-panel">
  <h2 id="project-name">Keyboard</h2>
  <div class="row"><span class="label">Keys</span><span class="value" id="key-count">--</span></div>
  <div class="row"><span class="label">Matrix</span><span class="value" id="matrix-dims">--</span></div>
  <div class="row"><span class="label">Switch</span><span class="value" id="switch-type">--</span></div>
  <div class="row"><span class="label">MCU</span><span class="value" id="mcu-type">--</span></div>
</div>

<div id="layer-panel">
  <h3>Layers</h3>
  <label><input type="checkbox" data-layer="case" checked /><span class="layer-color" style="background:#2a2a2a"></span>Case</label>
  <label><input type="checkbox" data-layer="pcb" checked /><span class="layer-color" style="background:#1a5c1a"></span>PCB</label>
  <label><input type="checkbox" data-layer="plate" checked /><span class="layer-color" style="background:#c0c0c0"></span>Plate</label>
  <label><input type="checkbox" data-layer="switches" checked /><span class="layer-color" style="background:#8b7355"></span>Switches</label>
  <label><input type="checkbox" data-layer="keycaps" checked /><span class="layer-color" style="background:#404040"></span>Keycaps</label>
</div>

<div id="bottom-bar">
  <span id="build-path">--</span>
</div>

<div id="canvas-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------
const UNIT = 19.05;                 // 1 KLE unit in mm
const SCALE = 0.01;                 // mm -> scene units (1 unit = 100 mm)
const PCB_THICKNESS = 1.6;
const PLATE_THICKNESS = 1.5;
const SWITCH_HEIGHT = 5;
const KEYCAP_HEIGHT = 7;
const CASE_WALL = 2;
const CASE_LIP = 1;

const COLORS = {
  pcb:      0x1a5c1a,
  copper:   0xb87333,
  plate:    0xc0c0c0,
  case:     0x2a2a2a,
  switches: 0x8b7355,
  keycaps:  0x404040,
  hover:    0x6699ff,
};

// ---------------------------------------------------------------------------
// Layer groups
// ---------------------------------------------------------------------------
const layers = {
  pcb:      new THREE.Group(),
  plate:    new THREE.Group(),
  case:     new THREE.Group(),
  switches: new THREE.Group(),
  keycaps:  new THREE.Group(),
};

// ---------------------------------------------------------------------------
// Scene setup
// ---------------------------------------------------------------------------
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// Dark gradient background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#1a1a2e');
grad.addColorStop(1, '#0f0f0f');
bgCtx.fillStyle = grad;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0.35, 0.45);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight1.position.set(5, 10, 7);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight2.position.set(-3, 6, -4);
scene.add(dirLight2);

// Grid
const gridHelper = new THREE.GridHelper(2, 40, 0x333333, 0x222222);
gridHelper.position.y = -0.02;
scene.add(gridHelper);

// Add layer groups to scene
Object.values(layers).forEach(g => scene.add(g));

// ---------------------------------------------------------------------------
// Material helpers
// ---------------------------------------------------------------------------
function mat(color, opts = {}) {
  return new THREE.MeshStandardMaterial({
    color,
    roughness: opts.roughness ?? 0.6,
    metalness: opts.metalness ?? 0.1,
    ...opts,
  });
}

// ---------------------------------------------------------------------------
// Geometry builders
// ---------------------------------------------------------------------------

/** Build the PCB layer (green board + copper pads hint). */
function buildPCB(keys, boardW, boardH) {
  // Main board
  const geo = new THREE.BoxGeometry(boardW * SCALE, PCB_THICKNESS * SCALE, boardH * SCALE);
  const mesh = new THREE.Mesh(geo, mat(COLORS.pcb, { roughness: 0.8 }));
  mesh.position.y = (PCB_THICKNESS / 2) * SCALE;
  layers.pcb.add(mesh);

  // Copper pad hints per key
  const padGeo = new THREE.BoxGeometry(5 * SCALE, 0.1 * SCALE, 5 * SCALE);
  const padMat = mat(COLORS.copper, { metalness: 0.5, roughness: 0.3 });
  keys.forEach(k => {
    const pad = new THREE.Mesh(padGeo, padMat);
    pad.position.set(k.cx * SCALE, (PCB_THICKNESS + 0.05) * SCALE, k.cy * SCALE);
    if (k.rotation) {
      pad.rotation.y = -k.rotation * (Math.PI / 180);
    }
    layers.pcb.add(pad);
  });
}

/** Build the switch plate. */
function buildPlate(keys, boardW, boardH, plateThickness) {
  const t = plateThickness || PLATE_THICKNESS;
  // Plate as a simple slab (cutouts approximated by visual only)
  const geo = new THREE.BoxGeometry(boardW * SCALE, t * SCALE, boardH * SCALE);
  const mesh = new THREE.Mesh(geo, mat(COLORS.plate, { metalness: 0.4, roughness: 0.25 }));
  const plateY = (PCB_THICKNESS + 0.2 + t / 2) * SCALE;
  mesh.position.y = plateY;
  layers.plate.add(mesh);

  // Cutouts — punch dark rectangles per key
  const cutGeo = new THREE.BoxGeometry(14 * SCALE, (t + 0.2) * SCALE, 14 * SCALE);
  const cutMat = mat(0x0a0a0a, { roughness: 1 });
  keys.forEach(k => {
    const cut = new THREE.Mesh(cutGeo, cutMat);
    cut.position.set(k.cx * SCALE, plateY, k.cy * SCALE);
    if (k.rotation) {
      cut.rotation.y = -k.rotation * (Math.PI / 180);
    }
    layers.plate.add(cut);
  });
}

/** Build switches. */
function buildSwitches(keys) {
  const bodyGeo = new THREE.BoxGeometry(14 * SCALE, SWITCH_HEIGHT * SCALE, 14 * SCALE);
  const stemGeo = new THREE.CylinderGeometry(1.7 * SCALE, 1.7 * SCALE, 3 * SCALE, 8);
  const bodyMat = mat(COLORS.switches, { roughness: 0.7 });
  const stemMat = mat(0xd4d4d4, { metalness: 0.2 });

  const plateTop = (PCB_THICKNESS + 0.2 + PLATE_THICKNESS) * SCALE;

  keys.forEach(k => {
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.set(k.cx * SCALE, plateTop + (SWITCH_HEIGHT / 2) * SCALE, k.cy * SCALE);
    if (k.rotation) body.rotation.y = -k.rotation * (Math.PI / 180);
    layers.switches.add(body);

    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.set(k.cx * SCALE, plateTop + (SWITCH_HEIGHT + 1.5) * SCALE, k.cy * SCALE);
    if (k.rotation) stem.rotation.y = -k.rotation * (Math.PI / 180);
    layers.switches.add(stem);
  });
}

/** Build keycaps. */
function buildKeycaps(keys) {
  const plateTop = (PCB_THICKNESS + 0.2 + PLATE_THICKNESS + SWITCH_HEIGHT) * SCALE;

  keys.forEach(k => {
    const kw = (k.w * UNIT - 1) * SCALE;
    const kh = (k.h * UNIT - 1) * SCALE;
    const geo = new THREE.BoxGeometry(kw, KEYCAP_HEIGHT * SCALE, kh);

    // Bevel the top edges
    geo.translate(0, KEYCAP_HEIGHT * SCALE / 2, 0);

    const mesh = new THREE.Mesh(geo, mat(COLORS.keycaps, { roughness: 0.85, metalness: 0.02 }));
    mesh.position.set(k.cx * SCALE, plateTop, k.cy * SCALE);
    if (k.rotation) mesh.rotation.y = -k.rotation * (Math.PI / 180);
    layers.keycaps.add(mesh);

    // Subtle top face dish (dark inset)
    const dishGeo = new THREE.BoxGeometry(kw * 0.8, 0.3 * SCALE, kh * 0.7);
    const dish = new THREE.Mesh(dishGeo, mat(0x303030));
    dish.position.set(
      k.cx * SCALE,
      plateTop + (KEYCAP_HEIGHT - 0.2) * SCALE,
      k.cy * SCALE
    );
    if (k.rotation) dish.rotation.y = -k.rotation * (Math.PI / 180);
    layers.keycaps.add(dish);
  });
}

/** Build a simple case shell around the board. */
function buildCase(boardW, boardH) {
  const caseH = PCB_THICKNESS + 4;          // depth below plate
  const outerW = boardW + CASE_WALL * 2;
  const outerH = boardH + CASE_WALL * 2;

  // Bottom slab
  const bottomGeo = new THREE.BoxGeometry(outerW * SCALE, 2 * SCALE, outerH * SCALE);
  const caseMat = mat(COLORS.case, { roughness: 0.9, metalness: 0.05 });
  const bottom = new THREE.Mesh(bottomGeo, caseMat);
  bottom.position.y = -1 * SCALE;
  layers.case.add(bottom);

  // Four walls
  const wallMat = mat(COLORS.case, { roughness: 0.9, metalness: 0.05 });
  const wallH = (caseH + PLATE_THICKNESS + CASE_LIP);

  // Front & back walls
  [1, -1].forEach(sign => {
    const wallGeo = new THREE.BoxGeometry(outerW * SCALE, wallH * SCALE, CASE_WALL * SCALE);
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(0, (wallH / 2 - 2) * SCALE, sign * (outerH / 2 - CASE_WALL / 2) * SCALE);
    layers.case.add(wall);
  });

  // Left & right walls
  [1, -1].forEach(sign => {
    const wallGeo = new THREE.BoxGeometry(CASE_WALL * SCALE, wallH * SCALE, outerH * SCALE);
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(sign * (outerW / 2 - CASE_WALL / 2) * SCALE, (wallH / 2 - 2) * SCALE, 0);
    layers.case.add(wall);
  });
}

// ---------------------------------------------------------------------------
// Key position parser
// ---------------------------------------------------------------------------

/**
 * Parse keys from layout.json (KLE format) or approximate from config.
 * Returns array of { cx, cy, w, h, rotation } in mm coordinates, centered.
 */
function parseKeys(layoutKeys) {
  if (!layoutKeys || layoutKeys.length === 0) return [];

  const parsed = layoutKeys.map(k => {
    const cx = (k.x + k.width / 2) * UNIT;
    const cy = (k.y + k.height / 2) * UNIT;
    return { cx, cy, w: k.width, h: k.height, rotation: k.rotation || 0 };
  });

  // Center on origin
  if (parsed.length === 0) return parsed;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  parsed.forEach(k => {
    const hw = (k.w * UNIT) / 2;
    const hh = (k.h * UNIT) / 2;
    if (k.cx - hw < minX) minX = k.cx - hw;
    if (k.cx + hw > maxX) maxX = k.cx + hw;
    if (k.cy - hh < minY) minY = k.cy - hh;
    if (k.cy + hh > maxY) maxY = k.cy + hh;
  });
  const offsetX = (minX + maxX) / 2;
  const offsetY = (minY + maxY) / 2;
  parsed.forEach(k => { k.cx -= offsetX; k.cy -= offsetY; });

  return parsed;
}

/**
 * Generate an approximate grid of keys from matrix dimensions.
 */
function approximateKeys(rows, cols) {
  const keys = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      keys.push({ x: c, y: r, width: 1, height: 1, rotation: 0, labels: [] });
    }
  }
  return keys;
}

// ---------------------------------------------------------------------------
// Board dimensions from keys
// ---------------------------------------------------------------------------
function boardDimensions(keys) {
  if (keys.length === 0) return { w: 100, h: 60 };
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  keys.forEach(k => {
    const hw = (k.w * UNIT) / 2;
    const hh = (k.h * UNIT) / 2;
    if (k.cx - hw < minX) minX = k.cx - hw;
    if (k.cx + hw > maxX) maxX = k.cx + hw;
    if (k.cy - hh < minY) minY = k.cy - hh;
    if (k.cy + hh > maxY) maxY = k.cy + hh;
  });
  return { w: maxX - minX + 6, h: maxY - minY + 6 }; // 3mm margin each side
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
async function init() {
  let config = {};
  let files = [];
  let buildDir = '';

  try {
    const res = await fetch('/api/build-info');
    const data = await res.json();
    config = data.config || {};
    files = data.files || [];
    buildDir = data.buildDir || '';
  } catch (e) {
    console.warn('Could not load build info:', e);
  }

  // Populate info panel
  document.getElementById('project-name').textContent = config.project?.name || 'Keyboard';
  document.getElementById('switch-type').textContent = config.switches?.type || '--';
  document.getElementById('mcu-type').textContent = config.mcu?.module || config.mcu?.type || '--';
  document.getElementById('build-path').textContent = buildDir || '--';

  // Try to load layout.json from build dir
  let layoutKeys = null;
  if (files.some(f => f === 'layout.json' || f.endsWith('/layout.json'))) {
    try {
      const layoutRes = await fetch('/build/layout.json');
      const layoutData = await layoutRes.json();
      // Could be { keys: [...] } or raw KLE array structure
      if (layoutData.keys && Array.isArray(layoutData.keys)) {
        layoutKeys = layoutData.keys;
      }
    } catch (e) {
      console.warn('Could not load layout.json:', e);
    }
  }

  // If no layout, approximate from matrix info in config
  if (!layoutKeys) {
    // Try to figure out matrix size from config
    const rows = config.mcu?.gpioAvailable ? Math.min(6, Math.ceil(config.mcu.gpioAvailable / 2)) : 5;
    const cols = config.mcu?.gpioAvailable ? Math.min(15, config.mcu.gpioAvailable - rows) : 12;
    layoutKeys = approximateKeys(rows, cols);
  }

  const keys = parseKeys(layoutKeys);
  const keyCount = keys.length;
  document.getElementById('key-count').textContent = String(keyCount);

  // Guess matrix dims
  if (layoutKeys.length > 0) {
    const maxRow = Math.max(...layoutKeys.map(k => Math.floor(k.y || 0))) + 1;
    const maxCol = Math.max(...layoutKeys.map(k => Math.floor(k.x + (k.width || 1) - 0.01))) ;
    document.getElementById('matrix-dims').textContent = `${maxRow} x ${maxCol}`;
  }

  const { w: boardW, h: boardH } = boardDimensions(keys);

  const plateThickness = config.plate?.thickness || PLATE_THICKNESS;

  buildPCB(keys, boardW, boardH);
  buildPlate(keys, boardW, boardH, plateThickness);
  buildSwitches(keys);
  buildKeycaps(keys);
  buildCase(boardW, boardH);

  // Center camera on the board
  const cx = 0;
  const cy = 0.03;
  const cz = 0;
  controls.target.set(cx, cy, cz);
  const dist = Math.max(boardW, boardH) * SCALE * 1.6;
  camera.position.set(cx, cy + dist * 0.7, cz + dist);
  controls.update();

  // Hide loading
  document.getElementById('loading').classList.add('hidden');
}

// ---------------------------------------------------------------------------
// Layer toggle wiring
// ---------------------------------------------------------------------------
document.querySelectorAll('#layer-panel input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    const layerName = cb.dataset.layer;
    if (layers[layerName]) {
      layers[layerName].visible = cb.checked;
    }
  });
});

// ---------------------------------------------------------------------------
// Resize handling
// ---------------------------------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------------------------------------------------------------------------
// Render loop
// ---------------------------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
init();
</script>
</body>
</html>
